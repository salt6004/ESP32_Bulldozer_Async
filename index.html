<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32 Bulldozer Pro Controller</title>
    <style>
        :root {
            --primary-yellow: #FFB300;
            --dark-bg: #1A1A1D;
            --panel-bg: #222224;
            --danger-red: #D32F2F;
            --success-green: #388E3C;
            --warning-orange: #F57C00;
            --text-muted: #888;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                linear-gradient(45deg, #151515 25%, transparent 25%, transparent 75%, #151515 75%, #151515), 
                linear-gradient(45deg, #151515 25%, transparent 25%, transparent 75%, #151515 75%, #151515);
            background-size: 8px 8px;
            background-position: 0 0, 4px 4px;
            color: #fff;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            height: 50px;
            background: linear-gradient(to bottom, #333, #1a1a1a);
            border-bottom: 2px solid #000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); z-index: 10;
            flex-shrink: 0;
        }

        .brand {
            font-size: 1.2rem; font-weight: 900; color: var(--primary-yellow);
            letter-spacing: 2px; text-shadow: 1px 1px 0 #000;
            display: flex; align-items: center; gap: 10px;
        }

        .status-panel { display: flex; align-items: center; gap: 15px; }
        
        .led-container {
            display: flex; align-items: center; gap: 8px;
            background: #000; padding: 4px 10px;
            border-radius: 15px; border: 1px solid #333;
        }
        .led {
            width: 10px; height: 10px; border-radius: 50%;
            background-color: var(--danger-red);
            box-shadow: 0 0 8px var(--danger-red);
            transition: all 0.3s;
        }
        .led.connected    { background-color: var(--success-green); box-shadow: 0 0 10px var(--success-green); }
        .led.reconnecting { background-color: var(--warning-orange); box-shadow: 0 0 10px var(--warning-orange);
                            animation: blink 0.5s infinite; }

        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

        .status-text { font-size: 0.8rem; font-family: monospace; color: #ccc; min-width: 110px; text-align: center; }

        #connect-btn {
            background: linear-gradient(to bottom, #444, #222);
            border: 1px solid #000; color: #fff; padding: 6px 16px;
            border-radius: 4px; font-weight: bold; font-size: 0.85rem; cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 4px rgba(0,0,0,0.5);
            text-transform: uppercase; transition: all 0.2s; white-space: nowrap;
        }
        #connect-btn:active { background: #111; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); }
        #connect-btn.connected   { color: var(--success-green); border-color: var(--success-green); }
        #connect-btn.reconnecting{ color: var(--warning-orange); border-color: var(--warning-orange); }
        #connect-btn:disabled    { opacity: 0.5; cursor: not-allowed; }

        /* コンソール */
        .console {
            flex: 1; display: flex; padding: 15px; gap: 15px;
            box-sizing: border-box; flex-direction: column;
            min-height: 0;
        }

        .panel-section {
            background: var(--panel-bg); border: 2px solid #111; border-radius: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 10px 20px rgba(0,0,0,0.8);
            padding: 15px; display: flex; position: relative;
        }
        .panel-section::before {
            content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px dashed rgba(255,255,255,0.05); pointer-events: none; border-radius: 6px;
        }

        .screw {
            position: absolute; width: 10px; height: 10px; background: #444;
            border-radius: 50%; box-shadow: inset 0 1px 3px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.1);
        }
        .screw::after {
            content: ''; position: absolute; top: 50%; left: 10%; width: 80%; height: 2px;
            background: #111; transform: translateY(-50%) rotate(45deg);
        }
        .screw.tl { top: 12px; left: 12px; } .screw.tr { top: 12px; right: 12px; }
        .screw.bl { bottom: 12px; left: 12px; } .screw.br { bottom: 12px; right: 12px; }

        .left-panel {
            flex: 1; display: flex; flex-direction: row;
            justify-content: space-evenly; align-items: center;
            max-height: 40%;
        }
        .right-panel {
            flex: 2; display: flex; justify-content: center; align-items: center;
        }

        @media (orientation: landscape) {
            .console { flex-direction: row; gap: 20px; }
            .left-panel { flex: 1; max-width: 40%; max-height: none; }
            .right-panel { flex: 1; }
        }

        .throttle-group {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; z-index: 1;
        }
        .panel-label {
            font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;
            font-weight: bold; margin-bottom: 10px; letter-spacing: 1px;
        }
        .slider-wrapper {
            position: relative; height: 140px; display: flex;
            align-items: center; justify-content: center;
            background: #111; padding: 10px 20px; border-radius: 8px;
            border: 1px solid #333; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }
        input[type=range] {
            -webkit-appearance: none; background: transparent;
            width: 140px; transform: rotate(-90deg); outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; background: #333; border-radius: 3px; border: 1px solid #000;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 30px; width: 40px;
            background: linear-gradient(to bottom, #ccc, #888);
            border-radius: 4px; border: 2px solid #222; margin-top: -13px;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #speedValueDisplay {
            margin-top: 10px; font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem; font-weight: bold; color: var(--primary-yellow);
            background: #0a0a0a; padding: 4px 12px; border-radius: 4px;
            border: 1px solid #222; box-shadow: inset 0 0 5px rgba(255, 179, 0, 0.2);
        }

        .macro-group { display: flex; flex-direction: column; gap: 15px; z-index: 1; }
        .macro-btn {
            background: repeating-linear-gradient(-45deg, #222, #222 10px, #1a1a1a 10px, #1a1a1a 20px);
            border: 2px solid #000; color: var(--primary-yellow); padding: 15px; border-radius: 8px;
            font-weight: 900; font-size: 0.8rem; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6); transition: transform 0.1s;
            text-transform: uppercase; width: 100px;
        }
        .macro-btn:active { transform: translateY(4px); box-shadow: 0 0px 2px rgba(0,0,0,0.8); color: #fff; }
        .macro-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Dパッド */
        .d-pad-container { z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 8px;
        }
        .dir-btn {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a); border: 2px solid #111; border-radius: 12px;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), inset 0 -2px 0 rgba(0,0,0,0.4), 0 6px 10px rgba(0,0,0,0.6);
            color: #ccc; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.05s; padding: 0; outline: none;
        }
        .dir-btn svg { width: 40px; height: 40px; fill: currentColor; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }
        .dir-btn:active, .dir-btn.active {
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.8), 0 1px 2px rgba(0,0,0,0.5);
            transform: translateY(4px); color: var(--primary-yellow);
        }
        .dir-btn#up    { grid-area: 1 / 2 / 2 / 3; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .dir-btn#left  { grid-area: 2 / 1 / 3 / 2; border-top-left-radius: 20px; border-bottom-left-radius: 20px; }
        .dir-btn#right { grid-area: 2 / 3 / 3 / 4; border-top-right-radius: 20px; border-bottom-right-radius: 20px; }
        .dir-btn#down  { grid-area: 3 / 2 / 4 / 3; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .dir-btn#stop  {
            grid-area: 2 / 2 / 3 / 3; background: radial-gradient(circle, #E53935, #b71c1c);
            border-radius: 50%; border: 4px solid #111; color: #fff;
            box-shadow: inset 0 4px 4px rgba(255,255,255,0.2), 0 6px 10px rgba(0,0,0,0.6);
        }
        .dir-btn#stop svg { width: 28px; height: 28px; }
        .dir-btn#stop:active, .dir-btn#stop.active {
            background: radial-gradient(circle, #c62828, #7f0000); color: #ccc;
            box-shadow: inset 0 6px 12px rgba(0,0,0,0.8), 0 1px 2px rgba(0,0,0,0.5);
        }

        @media (max-width: 500px), (max-height: 500px) {
            .d-pad { grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(3, 70px); }
            .dir-btn svg { width: 32px; height: 32px; }
            .slider-wrapper { height: 120px; }
            input[type=range] { width: 100px; }
            .macro-btn { padding: 10px; font-size: 0.75rem; width: 90px; }
            #speedValueDisplay { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M19 15v4H5v-4h14m1-2H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zM7 18.5c-.82 0-1.5-.68-1.5-1.5s.68-1.5 1.5-1.5 1.5.68 1.5 1.5-.68 1.5-1.5 1.5zm10 0c-.82 0-1.5-.68-1.5-1.5s.68-1.5 1.5-1.5 1.5.68 1.5 1.5-.68 1.5-1.5 1.5zM12 6l-4 4h3v3h2v-3h3l-4-4z"/>
            </svg>
            DOZER-PRO
        </div>
        <div class="status-panel">
            <div class="led-container">
                <div class="led" id="status-led"></div>
                <div class="status-text" id="connection-status">LINK OFFLINE</div>
            </div>
            <button id="connect-btn">CONNECT BLE</button>
        </div>
    </div>

    <div class="console">
        <div class="panel-section left-panel">
            <div class="screw tl"></div><div class="screw tr"></div>
            <div class="screw bl"></div><div class="screw br"></div>

            <div class="throttle-group">
                <div class="panel-label">Power Output</div>
                <div class="slider-wrapper">
                    <input type="range" id="speedSlider" min="0" max="255" value="200">
                </div>
                <div id="speedValueDisplay">200</div>
            </div>

            <div class="macro-group">
                <div class="panel-label" style="text-align:center; margin-bottom:0;">Auto Seq</div>
                <button id="timed-forward"  class="macro-btn">FWD 5s</button>
                <button id="timed-backward" class="macro-btn">REV 5s</button>
            </div>
        </div>

        <div class="panel-section right-panel">
            <div class="screw tl"></div><div class="screw tr"></div>
            <div class="screw bl"></div><div class="screw br"></div>

            <div class="d-pad-container">
                <div class="panel-label">Drive Control</div>
                <div class="d-pad">
                    <button id="up"    class="dir-btn control-button"><svg viewBox="0 0 24 24"><path d="M12 4l-8 8h6v8h4v-8h6z"/></svg></button>
                    <button id="left"  class="dir-btn control-button"><svg viewBox="0 0 24 24"><path d="M4 12l8 8v-6h8v-4h-8V4z"/></svg></button>
                    <button id="stop"  class="dir-btn control-button"><svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg></button>
                    <button id="right" class="dir-btn control-button"><svg viewBox="0 0 24 24"><path d="M20 12l-8-8v6H4v4h8v6z"/></svg></button>
                    <button id="down"  class="dir-btn control-button"><svg viewBox="0 0 24 24"><path d="M12 20l8-8h-6V4h-4v8H4z"/></svg></button>
                </div>
            </div>
        </div>
    </div>

    <script>
    // =========================================================================
    // BLE接続管理
    // =========================================================================
    const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const RX_CHAR_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

    const statusLed    = document.getElementById('status-led');
    const statusText   = document.getElementById('connection-status');
    const connectBtn   = document.getElementById('connect-btn');

    let bluetoothDevice   = null;
    let rxCharacteristic  = null;
    let isConnected       = false;
    let isReconnecting    = false;
    let reconnectTimer    = null;
    const MAX_RECONNECT_ATTEMPTS = 5;
    let reconnectAttempts = 0;

    // ★ UIステート更新をひとつの関数に集約
    function setUIState(state) {
        statusLed.className = 'led';
        connectBtn.className = '';
        connectBtn.disabled = false;

        if (state === 'connected') {
            statusLed.classList.add('connected');
            statusText.textContent = 'LINK ONLINE';
            statusText.style.color = 'var(--success-green)';
            connectBtn.classList.add('connected');
            connectBtn.textContent = 'LINK ACTIVE';
            connectBtn.disabled = true;
        } else if (state === 'reconnecting') {
            statusLed.classList.add('reconnecting');
            statusText.textContent = 'RECONNECTING…';
            statusText.style.color = 'var(--warning-orange)';
            connectBtn.classList.add('reconnecting');
            connectBtn.textContent = 'RECONNECT';
            connectBtn.disabled = true;
        } else {
            statusText.textContent = 'LINK OFFLINE';
            statusText.style.color = '#ccc';
            connectBtn.textContent = 'CONNECT BLE';
        }
    }

    async function connectBLE() {
        try {
            if (!bluetoothDevice) {
                // 初回: ユーザーにデバイス選択ダイアログを表示
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32-Bulldozer' }],
                    optionalServices: [SERVICE_UUID]
                });
                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
            }

            const server  = await bluetoothDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            rxCharacteristic = await service.getCharacteristic(RX_CHAR_UUID);

            isConnected       = true;
            isReconnecting    = false;
            reconnectAttempts = 0;
            clearTimeout(reconnectTimer);
            setUIState('connected');
            console.log('[BLE] Connected');
        } catch (err) {
            console.error('[BLE] Connect error:', err);
            isConnected = false;
            rxCharacteristic = null;

            if (isReconnecting && reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                scheduleReconnect();
            } else {
                isReconnecting = false;
                setUIState('offline');
            }
        }
    }

    // ★ 切断時に自動再接続をスケジュール
    function onDisconnected() {
        isConnected      = false;
        rxCharacteristic = null;
        console.log('[BLE] Disconnected');

        // 走行中なら操作をリセット
        stopMove();

        if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
            isReconnecting = true;
            setUIState('reconnecting');
            scheduleReconnect();
        } else {
            setUIState('offline');
        }
    }

    function scheduleReconnect() {
        reconnectAttempts++;
        // 指数バックオフ: 1秒 → 2秒 → 4秒 → …（最大8秒）
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 8000);
        console.log(`[BLE] Reconnect attempt ${reconnectAttempts} in ${delay}ms`);
        reconnectTimer = setTimeout(connectBLE, delay);
    }

    connectBtn.addEventListener('click', () => {
        if (isConnected || isReconnecting) return;
        reconnectAttempts = 0;
        bluetoothDevice   = null;  // 再選択させる
        setUIState('reconnecting');
        connectBLE();
    });

    // =========================================================================
    // コマンド送信キュー (WriteWithoutResponse + 非同期キュー)
    // =========================================================================
    let isSending     = false;
    let pendingCmd    = null;  // 最新コマンドだけを保持（古いものは上書き）

    async function sendCommand(direction, speed) {
        if (!isConnected || !rxCharacteristic) return;

        // ★ キューに積む（古いpendingは捨てて最新優先）
        pendingCmd = { direction, speed };

        if (isSending) return;  // 送信中なら次の送信完了時に処理される
        isSending = true;

        while (pendingCmd) {
            const cmd = pendingCmd;
            pendingCmd = null;

            try {
                const data = new TextEncoder().encode(`${cmd.direction}:${cmd.speed}`);
                await rxCharacteristic.writeValueWithoutResponse(data);
            } catch (err) {
                console.error('[BLE] Send error:', err);
                // 送信失敗 = 切断とみなしてフロー終了
                isSending = false;
                return;
            }

            // ★ 連続送信の間隔を20msに設定
            //    WriteWithoutResponseでも短すぎると内部バッファがあふれる
            if (pendingCmd) await sleep(20);
        }

        isSending = false;
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // =========================================================================
    // ハートビート (ping) — 2秒ごとに送信
    // =========================================================================
    // ★ 1秒→2秒に変更: pingが多すぎると通信帯域を圧迫する
    //    ESP32側のFAILSAFE_TIMEOUT=3秒に対して余裕を持たせる
    setInterval(async () => {
        if (!isConnected || !rxCharacteristic || isSending) return;
        try {
            const data = new TextEncoder().encode('ping');
            await rxCharacteristic.writeValueWithoutResponse(data);
        } catch (err) {
            console.warn('[BLE] Ping failed');
        }
    }, 2000);

    // =========================================================================
    // 操作UI
    // =========================================================================
    const buttons     = document.querySelectorAll('.control-button');
    const timedFwdBtn = document.getElementById('timed-forward');
    const timedRevBtn = document.getElementById('timed-backward');
    const speedSlider = document.getElementById('speedSlider');
    const speedDisplay= document.getElementById('speedValueDisplay');

    let currentDirection = 'stop';
    let currentSpeed     = parseInt(speedSlider.value);

    function startMove(direction) {
        if (currentDirection === direction) return;
        currentDirection = direction;
        buttons.forEach(b => b.classList.remove('active'));
        document.getElementById(direction)?.classList.add('active');
        sendCommand(currentDirection, currentSpeed);
    }

    function stopMove() {
        if (currentDirection === 'stop') return;
        currentDirection = 'stop';
        buttons.forEach(b => b.classList.remove('active'));
        sendCommand('stop', currentSpeed);
    }

    buttons.forEach(btn => {
        const dir = btn.id;
        btn.addEventListener('mousedown',   e => { e.preventDefault(); startMove(dir); });
        btn.addEventListener('touchstart',  e => { e.preventDefault(); startMove(dir); }, { passive: false });
        btn.addEventListener('mouseup',     e => { e.preventDefault(); stopMove(); });
        btn.addEventListener('mouseleave',  e => { e.preventDefault(); stopMove(); });
        btn.addEventListener('touchend',    e => { e.preventDefault(); stopMove(); });
        btn.addEventListener('touchcancel', e => { e.preventDefault(); stopMove(); });
    });

    function handleTimedMove(direction, duration) {
        sendCommand(direction, currentSpeed);
        timedFwdBtn.disabled = true;
        timedRevBtn.disabled = true;
        setTimeout(() => {
            timedFwdBtn.disabled = false;
            timedRevBtn.disabled = false;
            stopMove();
        }, duration);
    }
    timedFwdBtn.addEventListener('click', () => handleTimedMove('timed-forward',  5000));
    timedRevBtn.addEventListener('click', () => handleTimedMove('timed-backward', 5000));

    speedSlider.addEventListener('input', () => {
        currentSpeed = parseInt(speedSlider.value);
        speedDisplay.textContent = String(currentSpeed).padStart(3, '0');
    });
    speedSlider.addEventListener('change', () => {
        if (currentDirection !== 'stop') {
            sendCommand(currentDirection, currentSpeed);
        }
    });

    // =========================================================================
    // キーボード操作
    // =========================================================================
    const keyMap = {
        'ArrowUp':'up',   'w':'up',   'W':'up',
        'ArrowDown':'down','s':'down','S':'down',
        'ArrowLeft':'left','a':'left','A':'left',
        'ArrowRight':'right','d':'right','D':'right',
        ' ':'stop'
    };
    let activeKey = null;

    document.addEventListener('keydown', e => {
        if (activeKey === e.key) return;
        const dir = keyMap[e.key];
        if (dir) { e.preventDefault(); activeKey = e.key; startMove(dir); }
    });
    document.addEventListener('keyup', e => {
        const dir = keyMap[e.key];
        if (dir && activeKey === e.key) { e.preventDefault(); activeKey = null; stopMove(); }
    });
    </script>
</body>
</html>
