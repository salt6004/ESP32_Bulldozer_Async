<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ラジコンプログラミング (Bluetooth)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #f0fdf4;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(253, 224, 71, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(253, 224, 71, 0); }
            100% { box-shadow: 0 0 0 0 rgba(253, 224, 71, 0); }
        }
        .executing-block {
            transform: scale(1.02);
            border-color: #fde047 !important;
            animation: pulse-ring 1s infinite;
            z-index: 10;
        }
    </style>
</head>
<body class="h-screen w-full overflow-hidden text-gray-800 flex justify-center bg-gray-200">
    
    <div id="app-container" class="w-full max-w-md h-full flex flex-col bg-white shadow-2xl relative mx-auto transition-all duration-300">
        
        <div id="left-pane" class="w-full flex flex-col flex-shrink-0 z-20 shadow-md transition-all duration-300">
            <header class="bg-emerald-500 text-white p-3 flex justify-between items-center shadow-md z-20 shrink-0">
                <h1 class="text-lg font-extrabold flex items-center gap-2">
                    <i data-lucide="bot" class="w-6 h-6"></i> ラジコンプログラミング
                </h1>
                <div class="flex items-center gap-2">
                    <button id="btn-connect" onclick="toggleBluetooth()" class="flex items-center gap-1 bg-gray-400 px-3 py-1.5 rounded-full text-sm font-bold transition-colors active:scale-90 shadow-sm">
                        <i id="ble-icon" data-lucide="bluetooth" class="w-4 h-4"></i>
                        <span id="ble-text">つなぐ</span>
                    </button>
                    <button onclick="toggleSettings()" class="p-2 bg-emerald-600 rounded-full active:scale-90 transition-transform">
                        <i data-lucide="settings" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <div id="settings-area" class="hidden bg-emerald-50 p-4 border-b-2 border-emerald-200 z-10 shadow-inner shrink-0">
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-bold text-emerald-800">モーターのはやさ (0〜255)</label>
                        <span id="pwm-display" class="font-bold text-emerald-700">200</span>
                    </div>
                    <input type="range" id="pwm-speed" min="0" max="255" value="200" class="w-full accent-emerald-500">
                    <p class="text-xs text-emerald-600 mt-1 font-bold">はやさを変えると曲がりやすさも変わるよ！</p>
                </div>
            </div>

            <div class="p-3 bg-gray-100 border-b-4 border-gray-200 z-10 shrink-0" id="palette-area">
                <div class="flex bg-gray-200/80 rounded-lg p-1 mb-3 shadow-inner">
                    <button id="mode-sp" onclick="setUIMode('sp')" class="flex-1 py-1.5 text-sm font-bold rounded-md transition-all">📱 スマホ</button>
                    <button id="mode-pc" onclick="setUIMode('pc')" class="flex-1 py-1.5 text-sm font-bold rounded-md transition-all">💻 パソコン</button>
                </div>

                <div class="flex items-center justify-between bg-white rounded-xl p-2 mb-3 shadow-sm border border-gray-200">
                    <div class="text-xs font-bold text-gray-500 leading-tight">ついかするときの<br>うごくじかん</div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeDefaultTime(-1)" class="w-8 h-8 flex justify-center items-center bg-gray-200 text-gray-600 rounded-full font-bold active:bg-gray-300 active:scale-90"><i data-lucide="minus" class="w-4 h-4"></i></button>
                        <div class="text-center w-12 font-extrabold text-emerald-600 text-lg"><span id="time-display">1</span><span class="text-xs text-gray-500">s</span></div>
                        <button onclick="changeDefaultTime(1)" class="w-8 h-8 flex justify-center items-center bg-emerald-100 text-emerald-700 rounded-full font-bold active:bg-emerald-200 active:scale-90"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2" id="palette">
                    </div>
            </div>
        </div>

        <div id="right-pane" class="flex flex-col flex-1 relative bg-slate-50 overflow-hidden transition-all duration-300">
            <div class="flex-1 overflow-y-auto p-4 relative" id="program-container">
                <div id="empty-message" class="absolute inset-0 flex flex-col items-center justify-center text-gray-300 pointer-events-none">
                    <i data-lucide="list-plus" class="w-16 h-16 mb-2 opacity-50"></i>
                    <p class="font-bold">ブロックをならべてね</p>
                </div>
                <div id="program-list" class="flex flex-col gap-2 pb-4"></div>
            </div>

            <div class="p-3 bg-white border-t-4 border-gray-200 flex flex-col gap-2 z-20 pb-6 sm:pb-4 shrink-0">
                <div class="flex gap-2 h-14">
                    <button onclick="clearProgram()" id="btn-clear" class="flex-[1] bg-gray-200 text-gray-600 font-bold rounded-xl flex items-center justify-center gap-1 active:bg-gray-300 active:translate-y-1 transition-all border-b-4 border-gray-300">
                        <i data-lucide="trash-2" class="w-5 h-5"></i> ぜんぶけす
                    </button>
                    <button onclick="emergencyStop()" class="flex-[1.5] bg-red-500 text-white font-extrabold rounded-xl flex items-center justify-center gap-1 active:bg-red-600 active:translate-y-1 transition-all border-b-4 border-red-700">
                        <i data-lucide="octagon-alert" class="w-6 h-6"></i> とまれ！
                    </button>
                </div>
                <button onclick="executeProgram()" id="btn-execute" class="w-full h-16 bg-emerald-500 text-white font-extrabold rounded-xl flex items-center justify-center gap-2 active:bg-emerald-600 active:translate-y-1 transition-all border-b-4 border-emerald-700 relative overflow-hidden">
                    <div id="execute-content" class="flex items-center gap-2">
                        <i data-lucide="play" class="w-8 h-8 fill-white"></i>
                        <span class="text-xl tracking-wider">じっこう！</span>
                    </div>
                    <div id="execute-loader" class="hidden flex items-center gap-2">
                        <i data-lucide="loader-2" class="animate-spin w-8 h-8"></i>
                        <span class="text-xl tracking-wider">うごき中...</span>
                    </div>
                </button>
            </div>
        </div>

        <div id="toast" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-6 py-4 rounded-3xl text-xl font-bold transition-opacity duration-300 opacity-0 pointer-events-none z-50 whitespace-nowrap shadow-xl">
            メッセージ
        </div>
    </div>

    <script>
        // ==========================================
        // UI・プログラム管理
        // ==========================================
        const blockTypes = [
            { id: 'F', label: 'すすむ', icon: 'arrow-big-up', bg: 'bg-sky-400', border: 'border-sky-500' },
            { id: 'B', label: 'さがる', icon: 'arrow-big-down', bg: 'bg-pink-400', border: 'border-pink-500' },
            { id: 'R', label: 'みぎまわり', icon: 'redo', bg: 'bg-orange-400', border: 'border-orange-500' },
            { id: 'L', label: 'ひだりまわり', icon: 'undo', bg: 'bg-purple-400', border: 'border-purple-500' },
            { id: 'W', label: 'まつ', icon: 'hourglass', bg: 'bg-slate-400', border: 'border-slate-500' },
            { id: 'S', label: 'とまる', icon: 'octagon', bg: 'bg-red-500', border: 'border-red-600' }
        ];

        let program = [];
        let isExecuting = false;
        let abortExecution = false;
        let defaultSetTime = 1; 
        
        let sortableInstance = null; 
        
        let uiMode = localStorage.getItem('rcUIMode');
        if (!uiMode) {
            uiMode = window.innerWidth >= 768 ? 'pc' : 'sp';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const palette = document.getElementById('palette');
            blockTypes.forEach(block => {
                const btn = document.createElement('button');
                btn.className = `${block.bg} text-white p-2 rounded-xl flex flex-col items-center justify-center font-bold border-b-4 ${block.border} active:border-b-0 active:translate-y-1 transition-all shadow-sm`;
                btn.innerHTML = `
                    <i data-lucide="${block.icon}" class="w-6 h-6 mb-1 ${block.id !== 'W' && block.id !== 'S' ? 'fill-white' : ''}"></i>
                    <span class="text-xs">${block.label}</span>
                `;
                btn.onclick = () => addBlock(block.id);
                palette.appendChild(btn);
            });

            const pwmSpeed = document.getElementById('pwm-speed');
            const pwmDisplay = document.getElementById('pwm-display');
            pwmSpeed.addEventListener('input', (e) => {
                pwmDisplay.textContent = e.target.value;
            });

            lucide.createIcons();
            updateUI();
            applyUIMode(); 
            
            const listEl = document.getElementById('program-list');
            sortableInstance = new Sortable(listEl, {
                animation: 150,
                handle: '.drag-handle',
                onEnd: function (evt) {
                    if (evt.oldIndex !== evt.newIndex) {
                        const movedItem = program.splice(evt.oldIndex, 1)[0];
                        program.splice(evt.newIndex, 0, movedItem);
                        updateUI(); 
                    }
                }
            });
        });

        // 画面モード切り替えの関数
        function setUIMode(mode) {
            uiMode = mode;
            localStorage.setItem('rcUIMode', mode);
            applyUIMode();
        }

        function applyUIMode() {
            const appContainer = document.getElementById('app-container');
            const leftPane = document.getElementById('left-pane');
            const rightPane = document.getElementById('right-pane');
            const btnSp = document.getElementById('mode-sp');
            const btnPc = document.getElementById('mode-pc');

            if (uiMode === 'pc') {
                appContainer.className = "w-full max-w-5xl h-full flex flex-row bg-white shadow-2xl relative mx-auto transition-all duration-300";
                leftPane.className = "w-96 flex flex-col flex-shrink-0 z-20 shadow-md border-r-4 border-gray-200 overflow-y-auto bg-gray-50 transition-all duration-300";
                rightPane.className = "flex flex-col flex-1 relative bg-slate-50 overflow-hidden transition-all duration-300";
                
                btnPc.classList.add('bg-white', 'shadow', 'text-emerald-700');
                btnPc.classList.remove('text-gray-500', 'hover:bg-gray-300');
                btnSp.classList.remove('bg-white', 'shadow', 'text-emerald-700');
                btnSp.classList.add('text-gray-500', 'hover:bg-gray-300');
            } else {
                appContainer.className = "w-full max-w-md h-full flex flex-col bg-white shadow-2xl relative mx-auto transition-all duration-300";
                leftPane.className = "w-full flex flex-col flex-shrink-0 z-20 shadow-md transition-all duration-300";
                rightPane.className = "flex flex-col flex-1 relative bg-slate-50 overflow-hidden transition-all duration-300";
                
                btnSp.classList.add('bg-white', 'shadow', 'text-emerald-700');
                btnSp.classList.remove('text-gray-500', 'hover:bg-gray-300');
                btnPc.classList.remove('bg-white', 'shadow', 'text-emerald-700');
                btnPc.classList.add('text-gray-500', 'hover:bg-gray-300');
            }
        }

        function changeDefaultTime(delta) {
            defaultSetTime += delta;
            if (defaultSetTime < 1) defaultSetTime = 1; 
            if (defaultSetTime > 60) defaultSetTime = 60; 
            document.getElementById('time-display').textContent = defaultSetTime.toString();
        }

        function addBlock(blockId) {
            if (isExecuting) return;
            if (program.length >= 30) {
                showToast("ブロックはいっぱいです！", "bg-orange-500");
                return;
            }
            const blockDef = blockTypes.find(b => b.id === blockId);
            const msTime = Math.round(defaultSetTime * 1000);
            
            program.push({ 
                ...blockDef, 
                uniqueId: Date.now(),
                timeMs: msTime,
                timeLabel: defaultSetTime.toString() 
            });
            updateUI();
            setTimeout(() => {
                const container = document.getElementById('program-container');
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        function changeBlockTime(index, delta) {
            if (isExecuting) return;
            let currentTimeSec = parseInt(program[index].timeLabel);
            currentTimeSec += delta;
            if (currentTimeSec < 1) currentTimeSec = 1; 
            if (currentTimeSec > 60) currentTimeSec = 60;
            program[index].timeLabel = currentTimeSec.toString();
            program[index].timeMs = currentTimeSec * 1000;
            updateUI();
        }

        function removeBlock(index) {
            if (isExecuting) return;
            program.splice(index, 1);
            updateUI();
        }

        function clearProgram() {
            if (isExecuting || program.length === 0) return;
            program = [];
            updateUI();
        }

        function updateUI() {
            const listEl = document.getElementById('program-list');
            const emptyMsg = document.getElementById('empty-message');
            
            emptyMsg.style.display = program.length === 0 ? 'flex' : 'none';
            listEl.innerHTML = '';
            
            program.forEach((block, index) => {
                const item = document.createElement('div');
                item.id = `block-${index}`;
                item.className = `${block.bg} text-white p-2 rounded-xl flex items-center justify-between border-2 border-transparent transition-all shadow-sm`;
                item.innerHTML = `
                    <div class="flex items-center gap-2 font-bold flex-1">
                        <div class="drag-handle cursor-grab active:cursor-grabbing shrink-0 ${isExecuting ? 'text-white/20 pointer-events-none' : 'text-white/60 hover:text-white'}">
                            <i data-lucide="grip-vertical" class="w-6 h-6"></i>
                        </div>
                        
                        <div class="bg-white/20 w-6 h-6 rounded-lg text-xs flex items-center justify-center shrink-0">${index + 1}</div>
                        <i data-lucide="${block.icon}" class="w-6 h-6 shrink-0 ${block.id !== 'W' && block.id !== 'S' ? 'fill-white' : ''}"></i>
                        <span class="text-sm truncate w-16 sm:w-auto">${block.label}</span>
                    </div>
                    <div class="flex items-center gap-1 sm:gap-2 mr-1">
                        <button onclick="changeBlockTime(${index}, -1)" class="w-8 h-8 flex items-center justify-center bg-black/10 rounded-lg active:bg-black/30 transition-colors ${isExecuting ? 'pointer-events-none opacity-50' : ''}"><i data-lucide="minus" class="w-4 h-4"></i></button>
                        <span class="text-sm font-extrabold w-8 text-center">${block.timeLabel}s</span>
                        <button onclick="changeBlockTime(${index}, 1)" class="w-8 h-8 flex items-center justify-center bg-black/10 rounded-lg active:bg-black/30 transition-colors ${isExecuting ? 'pointer-events-none opacity-50' : ''}"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                    <button onclick="removeBlock(${index})" class="bg-white/20 w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/40 active:scale-90 transition-transform shrink-0 ${isExecuting ? 'hidden' : ''}"><i data-lucide="x" class="w-5 h-5"></i></button>
                `;
                listEl.appendChild(item);
            });
            lucide.createIcons();
        }

        async function executeProgram() {
            if (isExecuting || program.length === 0) return;
            if (!bleDevice || !bleDevice.gatt.connected) {
                showToast("Bluetoothをつないでね！", "bg-red-500");
                return;
            }
            
            isExecuting = true;
            abortExecution = false;
            setExecutionMode(true);
            showToast("プログラムをそうしん中...", "bg-blue-500");

            // 1. ESP32側のプログラムメモリをクリア
            await sendCommandToESP32("CLR:0");
            await sleepWithAbort(200); 

            // 2. すべてのブロックの命令を一気に送信
            const speed = document.getElementById('pwm-speed').value;
            for (let i = 0; i < program.length; i++) {
                if (abortExecution) break; 
                const block = program[i];
                await sendCommandToESP32(`ADD:${block.id}:${speed}:${block.timeMs}`);
                await sleepWithAbort(150); 
            }

            if (abortExecution) {
                setExecutionMode(false);
                isExecuting = false;
                return;
            }

            // 3. 実行スタートの合図を送る
            await sendCommandToESP32("RUN:0");
            showToast("ロボットが動きます！", "bg-emerald-500");

            // 4. UI側のアニメーション（完了判定はESP32からの通信に任せる）
            runUIAnimation();
        }

        async function runUIAnimation() {
            for (let i = 0; i < program.length; i++) {
                if (abortExecution || !isExecuting) break; 
                highlightBlock(i);
                
                const blockEl = document.getElementById(`block-${i}`);
                if(blockEl) blockEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

                await sleepWithAbort(program[i].timeMs);
            }
            removeHighlight();
        }

        async function emergencyStop() {
            abortExecution = true;
            await sendCommandToESP32('S:0'); 
            removeHighlight();
            setExecutionMode(false);
            isExecuting = false;
            showToast("とまりました！", "bg-red-600");
        }

        function sleepWithAbort(ms) {
            return new Promise(resolve => {
                const interval = 50;
                let elapsed = 0;
                const timer = setInterval(() => {
                    elapsed += interval;
                    if (abortExecution || elapsed >= ms) {
                        clearInterval(timer);
                        resolve();
                    }
                }, interval);
            });
        }

        function highlightBlock(index) {
            removeHighlight();
            const blockEl = document.getElementById(`block-${index}`);
            if (blockEl) blockEl.classList.add('executing-block');
        }

        function removeHighlight() {
            document.querySelectorAll('.executing-block').forEach(el => el.classList.remove('executing-block'));
        }

        function setExecutionMode(executing) {
            const paletteArea = document.getElementById('palette-area');
            const btnClear = document.getElementById('btn-clear');
            const btnExecute = document.getElementById('btn-execute');
            
            if (executing) {
                paletteArea.classList.add('opacity-50', 'pointer-events-none');
                btnClear.classList.add('opacity-50', 'pointer-events-none');
                btnExecute.classList.add('pointer-events-none');
                btnExecute.classList.replace('bg-emerald-500', 'bg-yellow-500');
                btnExecute.classList.replace('border-emerald-700', 'border-yellow-600');
                document.getElementById('execute-content').classList.add('hidden');
                document.getElementById('execute-loader').classList.remove('hidden');
            } else {
                paletteArea.classList.remove('opacity-50', 'pointer-events-none');
                btnClear.classList.remove('opacity-50', 'pointer-events-none');
                btnExecute.classList.remove('pointer-events-none');
                btnExecute.classList.replace('bg-yellow-500', 'bg-emerald-500');
                btnExecute.classList.replace('border-yellow-600', 'border-emerald-700');
                document.getElementById('execute-content').classList.remove('hidden');
                document.getElementById('execute-loader').classList.add('hidden');
            }
            
            if (sortableInstance) {
                sortableInstance.option("disabled", executing);
            }
            
            updateUI();
        }

        function toggleSettings() {
            if(isExecuting) return;
            document.getElementById('settings-area').classList.toggle('hidden');
        }

        function showToast(message, bgColorClass = "bg-black/80") {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-white px-6 py-4 rounded-3xl text-xl font-bold transition-opacity duration-300 opacity-0 pointer-events-none z-50 whitespace-nowrap shadow-xl ${bgColorClass}`;
            requestAnimationFrame(() => toast.classList.remove('opacity-0'));
            setTimeout(() => toast.classList.add('opacity-0'), 2000);
        }

        // ==========================================
        // Web Bluetooth API (通信処理)
        // ==========================================
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const CMD_CHAR_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const TX_CHAR_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
        
        let bleDevice = null;
        let cmdCharacteristic = null;
        let txCharacteristic = null;
        let reconnectTimer = null;

        async function toggleBluetooth() {
            if (window.location.protocol === 'file:' && !navigator.userAgent.match(/(iPhone|iPod|iPad|Android)/)) {
                alert("【注意】\nパソコンのブラウザでは、セキュリティの都合上、ファイルを直接ダブルクリックして開いた状態（file://）だとBluetoothが使えません。\n\nGitHub Pages（https://...）にアップロードしたURLから開いてください。");
                return;
            }

            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
            } else {
                try {
                    bleDevice = await navigator.bluetooth.requestDevice({
                        filters: [{ name: 'ESP32-Bulldozer' }],
                        optionalServices: [SERVICE_UUID]
                    });
                    
                    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                    
                    showToast("つないでいます...", "bg-blue-500");
                    const server = await bleDevice.gatt.connect();
                    const service = await server.getPrimaryService(SERVICE_UUID);
                    cmdCharacteristic = await service.getCharacteristic(CMD_CHAR_UUID);
                    
                    txCharacteristic = await service.getCharacteristic(TX_CHAR_UUID);
                    await txCharacteristic.startNotifications();
                    txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);
                    
                    updateBleUI(true);
                    if (reconnectTimer) clearTimeout(reconnectTimer);
                    showToast("つながりました！", "bg-blue-600");
                } catch (error) {
                    console.error(error);
                    if (error.name !== 'NotFoundError') { 
                        // ★変更: 詳しいエラーの原因をアラートで表示するようにしました
                        alert("Bluetooth接続エラー: " + error.message + "\n\n【確認事項】\n1. パソコンのBluetoothが「オン」になっていますか？\n2. Chromeの設定でBluetoothの使用が許可されていますか？");
                        showToast("せつぞくしっぱい", "bg-red-500");
                    }
                }
            }
        }

        function onDisconnected() {
            cmdCharacteristic = null;
            txCharacteristic = null;
            updateBleUI(false);
            showToast("きれました。さいせつぞく中...", "bg-orange-500");
            
            if (isExecuting) emergencyStop(); 

            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(attemptReconnect, 2000);
        }

        async function attemptReconnect() {
            if (!bleDevice) return;
            try {
                console.log("再接続を試みます...");
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                cmdCharacteristic = await service.getCharacteristic(CMD_CHAR_UUID);
                
                txCharacteristic = await service.getCharacteristic(TX_CHAR_UUID);
                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                updateBleUI(true);
                showToast("さいせつぞくしました！", "bg-blue-600");
            } catch (error) {
                console.warn("再接続失敗、リトライします...", error);
                reconnectTimer = setTimeout(attemptReconnect, 3000);
            }
        }

        function updateBleUI(connected) {
            const btn = document.getElementById('btn-connect');
            const text = document.getElementById('ble-text');
            const icon = document.getElementById('ble-icon');
            
            if (connected) {
                btn.className = "flex items-center gap-1 bg-blue-500 text-white px-3 py-1.5 rounded-full text-sm font-bold transition-colors active:scale-90 shadow-md";
                text.textContent = "つながってる";
            } else {
                btn.className = "flex items-center gap-1 bg-gray-400 text-white px-3 py-1.5 rounded-full text-sm font-bold transition-colors active:scale-90 shadow-sm";
                text.textContent = "つなぐ";
            }
        }

        function handleNotifications(event) {
            const value = new TextDecoder().decode(event.target.value);
            console.log("ESP32からの通信:", value);
            
            if (value === "FINISH" && isExecuting) {
                isExecuting = false;
                removeHighlight();
                setExecutionMode(false);
                showToast("おわりました！", "bg-emerald-500");
            }
        }

        async function sendCommandToESP32(commandString) {
            if (!cmdCharacteristic) return;
            
            try {
                const encoder = new TextEncoder();
                await cmdCharacteristic.writeValue(encoder.encode(commandString));
            } catch (error) {
                console.warn("送信エラー:", error, "コマンド:", commandString);
            }
        }

        setInterval(() => {
            if (bleDevice && bleDevice.gatt.connected && !isExecuting) {
                sendCommandToESP32('ping');
            }
        }, 1000);

    </script>
</body>
</html>
